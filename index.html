  <script>

  const texts = {
    en: {
      preview: "Glimmers of light in dark times – Kohoba return with their new album Memories in Plastic, more focused than ever. Two years of reflection, experimentation and searching are distilled by the seasoned Bernese indie pop outfit into shimmering songs that gracefully balance pop appeal with emotional depth. With relaxed defiance, they play against adversity and absurdity, wrapping optimism in melody and words. Memories in Plastic is driven by the firm belief that the world is changed best while dancing – not a contradiction, but an absolute necessity.",
      full: `<p>Long considered an insider's tip, Kohoba have always sought the light at the end of the tunnel on their musical journey, which already includes two albums and an EP. When ideals begin to crumble and dreams seem out of reach, that's when Kohoba rise to play against the darkness. Memories in Plastic blends a wide-ranging indie pop sound, evoking the stylistic diversity of Phoenix, the emotional ambiguity of The 1975, and the introspective groove of Parcels. The album proves that political awareness and musical immediacy are no opposites. When the world grows darker and the future blurs, we need places of refuge that don't let us forget, but instead open new perspectives. Kohoba transform heaviness into movement – into clear 4/4 beats carried by Sebastian's earthy vocals, Phippu's straightforward drumming, Fabian's shimmering guitar, and playful synths – into songs that challenge and liberate in equal measure.</p>
      <p>Memories in Plastic shines a light on the cracks in a world out of joint: mass consumption and the chase for status symbols, selfishness and fractured relationships. "Crony C" examines the mechanisms of a system where cronyism and self-interest have long become the norm; "Run Away" grows into an urgent gesture of liberation – a call to break free from the weight of others' expectations and find inner peace. "Big L" confronts, with burning urgency, the consequences of the climate crisis.</p>
      <p>Memories in Plastic emerged partly from focused recording sessions and partly from ideas matured over years, slowly finding their final form. Pascal Sonntag, a long-time member of the Kohoba family and also the band's live sound engineer, took on recording, production, and mixing. Hannes Meister from Bang!Drums – affectionately nicknamed "Dr. Snare" by the band – supported the process with expert drum tuning and a range of custom drum setups. Michael Gsteiger shaped Kohoba's visual identity with his artwork and photography.</p>`,
      more: "more",
      less: "less"
    },
    de: {
      preview: "Lichtblicke in finsteren Zeiten – Kohoba sind zurück mit neuem Album «Memories in Plastic», konsequenter denn je. Zwei Jahre voller Reflexionen, Experimente, Suchen und Finden verdichtet das eingespielte Berner Indie Pop Outfit in schimmernde Songs, die den Spagat zwischen Pop und Tiefgang meistern. Mit entspannter Unbeugsamkeit spielen sie gegen Widrigkeiten und Absurditäten an, packen Optimismus in Noten und Text. «Memories in Plastic» lebt in der festen Überzeugung, dass sich die Welt am besten tanzend verändern lässt – kein Widerspruch, sondern die absolute Notwendigkeit.",
      full: `<p>Stets als Geheimtipp gehandelt, haben Kohoba auf ihrem musikalischen Weg, dessen Meilensteine bereits zwei Alben und eine EP umfassen, immer das Licht am Ende des Tunnels gesucht. Wenn Ideale bröckeln und Wünsche unerfüllbar scheinen, dann ist es Zeit für Kohoba, dagegen anzuspielen. «Memories in Plastic» vereint Indie Pop von Bandbreite, der Assoziationen mit der stilistischen Vielfalt von Phoenix, der emotionalen Ambiguität von The 1975 und dem introspektiven Groove vom Parcels weckt. Das Album beweist, dass politisches Bewusstsein und musikalische Unmittelbarkeit keine Gegensätze sind. Wenn die Welt düsterer wirkt und der Blick in die Zukunft verschwimmt, braucht es Zufluchtsorte, die nicht vergessen lassen wollen, sondern neue Perspektiven eröffnen. Schwere verwandeln Kohoba in Bewegung – in klare 4/4-Beats, getragen von Sebastians erdiger Stimme, Phippus gradlinigem Schlagzeug, Fabians schillernder Gitarre und verspielten Synths – in Songs, die gleichermassen fordern wie befreien.</p>
      <p>«Memories in Plastic» durchleuchten Missstände einer Welt aus den Fugen: Massenkonsum und Jagd nach Statussymbolen, Egoismus und zerrüttete Beziehungen. «Crony C» etwa durchleuchtet die Mechanismen eines Systems, in dem Vetternwirtschaft und Eigennutz längst zur Normalität geworden sind, «Run Away» reift zur eindringlichen Befreiungsgeste – ein Appell, sich vom Ballast fremder Erwartungen zu lösen und inneren Frieden zu finden. «Big L» behandelt mit brennender Dringlichkeit die Auswirkungen der Klimakrise.</p>
      <p>«Memories in Plastic» entstand teilweise unmittelbar in konzentrierten Sessions, teilweise waren es über Jahre gereifte Ideen, die langsam ihre finale Form fanden. Pascal Sonntag, seit dem zweiten Album fester Bestandteil der Band-Familie und auch live als Mischer mit dabei, übernahm Recording, Produktion und Mixing. Hannes Meister von Bang!Drums – von der Band liebevoll «Dr. Snare» genannt – unterstützte mit fachkundigem Drum-Tuning und dem Bereitstellen verschiedener fabrikeigener Schlagzeug-Setups. Michael Gsteiger prägte mit seinen Artworks und Fotos die visuelle Identität von Kohoba.</p>`,
      more: "mehr",
      less: "weniger"
    },
    fr: {
      preview: "Des lueurs d'espoir en temps sombres – Kohoba reviennent avec leur nouvel album Memories in Plastic, plus cohérents et déterminés que jamais. Deux années de réflexions, d'expérimentations, de recherches et de découvertes se condensent, sous les mains du groupe indie-pop bernois, en des morceaux scintillants qui allient subtilement profondeur et sens mélodique. Avec une sérénité obstinée, ils défient l'adversité et l'absurdité, insufflant optimisme dans leurs paroles et leurs notes. Memories in Plastic repose sur la conviction profonde que le meilleur moyen de changer le monde est de danser – non pas une contradiction, mais une nécessité absolue.",
      full: `<p>Toujours considérés comme un secret bien gardé, Kohoba ont toujours cherché la lumière au bout du tunnel tout au long d'un parcours musical déjà marqué par deux albums et un EP. Quand les idéaux s'effritent et que les rêves semblent inaccessibles, Kohoba savent qu'il est temps de jouer contre la résignation. Memories in Plastic réunit une indie-pop aux multiples facettes, évoquant la diversité stylistique de Phoenix, l'ambiguïté émotionnelle de The 1975 et le groove introspectif de Parcels. L'album démontre que conscience politique et immédiateté musicale ne s'excluent pas. Lorsque le monde s'assombrit et que l'avenir devient flou, il faut des refuges qui n'invitent pas à l'oubli mais à de nouvelles perspectives. Kohoba transforment la gravité en mouvement – en rythmes 4/4 clairs, portés par la voix chaleureuse de Sebastian, la batterie directe de Phippu, la guitare chatoyante de Fabian et des synthés ludiques – en chansons à la fois exigeantes et libératrices.</p>
      <p>Memories in Plastic met en lumière les dérèglements d'un monde en perte d'équilibre : consumérisme de masse, quête effrénée de symboles de statut, égoïsme et relations brisées. « Crony C » explore les mécanismes d'un système où le népotisme et l'intérêt personnel sont devenus la norme ; « Run Away » se déploie comme un geste pressant de libération – un appel à se détacher du poids des attentes d'autrui pour retrouver la paix intérieure. « Big L » aborde, avec une urgence brûlante, les effets de la crise climatique.</p>
      <p>Memories in Plastic est né à la fois de sessions concentrées et d'idées mûries sur plusieurs années, trouvant peu à peu leur forme finale. Pascal Sonntag, membre à part entière de la famille Kohoba depuis le deuxième album et ingénieur du son en concert, a assuré l'enregistrement, la production et le mixage. Hannes Meister de Bang!Drums – surnommé affectueusement « Dr. Snare » par le groupe – a apporté son expertise en accordage et en préparation de différents sets de batterie maison. Michael Gsteiger a façonné l'identité visuelle de Kohoba avec ses illustrations et ses photographies.</p>`,
      more: "plus",
      less: "moins"
    }
  };

  let currentLang = 'en';
  let expanded = false;

  function setLang(lang) {
    currentLang = lang;
    expanded = false;
    ['en','de','fr'].forEach(l => {
      const el = document.getElementById('lang-' + l);
      el.style.fontWeight = l === lang ? 'bold' : 'normal';
      el.style.textDecoration = l === lang ? 'underline' : 'none';
    });
    render();
  }

  function toggleMore() {
    expanded = !expanded;
    render();
    if (expanded) {
      setTimeout(() => {
        const el = document.getElementById('band-text');
        const top = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top: top, behavior: 'smooth' });
      }, 50);
    }
  }

  function render() {
    const t = texts[currentLang];
    document.getElementById('text-preview').innerHTML = '<p>' + t.preview + '</p>';
    const full = document.getElementById('text-full');
    full.innerHTML = expanded ? t.full : '';
    full.style.display = expanded ? 'block' : 'none';
    document.getElementById('more-link').textContent = expanded ? t.less : t.more;
  }

  render();
  </script>
